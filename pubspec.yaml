name: helpconnect_app
description: A community-powered compassion app connecting hearts and changing lives.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Location Services
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  
  # Image Handling
  image_picker: ^1.0.7
  image: ^4.1.3
  
  # Date & Time
  intl: ^0.19.0
  
  # Charts for Analytics
  fl_chart: ^0.66.0
  
  # URL Launcher (for maps)
  url_launcher: ^6.2.3
  
  # Share functionality
  share_plus: ^7.2.1
  
  # File picker for attachments
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  # Assets
  assets:
    - assets/images/
    - assets/icons/
